<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - AJ01</title>
  <link rel="stylesheet" href="css/Cadastros.css">
  <link rel="stylesheet" href="css/Components.css">
  <link rel="stylesheet" href="css/Global.css">
</head>
<body>
    <!--Bolinhas-->
  <div class="background-bubbles"></div>
    <!--Bolinhas-->
  <div class="container">
    <div class="card">
      <div class="brand-bar"></div>

      <h2>Cadastro de Pais</h2>
      <p>Crie sua conta para acessar o sistema do ministério infantil.</p>

      <!--ID - É um identificador único-->
      <!--Diferença entre ID e class:
          ID é único e não pode ser reutilizado
          Class pode ser reutilizado em vários elementos-->
      <div id="mensagem" class="mensagem-feedback"></div>

      <form id="formCadastro">
        <div class="input-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Digite seu nome completo" required>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Digite seu melhor email" required>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Crie uma senha" required>
        </div>

        <div class="input-group">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000">
        </div>

        <button type="submit">Cadastrar</button>
      </form>

      <div class="link-area">
        Já tem conta? <a href="Login.html">Entrar</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/Bubbles.js"></script>
</body>
</html>
